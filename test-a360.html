<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A360 Event Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 620px; margin: 40px auto; padding: 20px; }
    h1 { font-size: 20px; }
    .field-row { display: flex; align-items: center; margin-top: 12px; gap: 10px; }
    .field-row input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .field-row input[type="text"]:disabled { background: #eee; color: #aaa; }
    .field-row label { font-size: 13px; color: #333; width: 180px; flex-shrink: 0; }
    .field-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    button { margin-top: 20px; padding: 10px 24px; background: #2943D1; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    button:hover { background: #1f33a8; }
    #result { margin-top: 20px; padding: 12px; background: #f4f4f4; border-radius: 4px; font-size: 13px; white-space: pre-wrap; display: none; }
    #result.success { border-left: 4px solid #28a745; }
    #result.error { border-left: 4px solid #dc3545; }
    .hint { font-size: 12px; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>A360 Event Trigger Test</h1>
  <p class="hint">Check = field is included in request. Uncheck = field is excluded.</p>

  <div class="field-row">
    <input type="checkbox" id="chk-eventId" checked onchange="toggleField('eventId')">
    <label>Event ID</label>
    <input type="text" id="eventId" value="c45ca7899005462f8f7ffa6df351be65">
  </div>
  <div class="field-row">
    <input type="checkbox" id="chk-accountId" checked onchange="toggleField('accountId')">
    <label>Account ID</label>
    <input type="text" id="accountId" value="8181770">
  </div>
  <div class="field-row">
    <input type="checkbox" id="chk-email" checked onchange="toggleField('email')">
    <label>email</label>
    <input type="text" id="email" value="billybones.sp@gmail.com">
  </div>
  <div class="field-row">
    <input type="checkbox" id="chk-phone" checked onchange="toggleField('phone')">
    <label>phone</label>
    <input type="text" id="phone" value="+380683183712">
  </div>
  <div class="field-row">
    <input type="checkbox" id="chk-subscriberId" checked onchange="toggleField('subscriberId')">
    <label>chatbots_subscriber_id</label>
    <input type="text" id="subscriberId" value="6a325927dd151a668b03e351">
  </div>
  <div class="field-row">
    <input type="checkbox" id="chk-channel" checked onchange="toggleField('channel')">
    <label>chatbots_channel</label>
    <input type="text" id="channel" value="tg">
  </div>
  <div class="field-row">
    <input type="checkbox" id="chk-message" checked onchange="toggleField('message')">
    <label>message</label>
    <input type="text" id="message" value="">
  </div>

  <button onclick="sendEvent()">Send A360 Event</button>
  <div id="result"></div>

  <script>
    function toggleField(id) {
      var input = document.getElementById(id);
      var chk = document.getElementById('chk-' + id);
      input.disabled = !chk.checked;
    }

    function sendEvent() {
      var eventId = document.getElementById('eventId').value;
      var accountId = document.getElementById('accountId').value;
      var url = 'https://events.sendpulse.com/events/id/' + eventId + '/' + accountId;

      var fields = {
        email: 'email',
        phone: 'phone',
        chatbots_subscriber_id: 'subscriberId',
        chatbots_channel: 'channel',
        message: 'message'
      };

      var body = {};
      for (var key in fields) {
        var elId = fields[key];
        var chk = document.getElementById('chk-' + elId);
        if (chk && chk.checked) {
          body[key] = document.getElementById(elId).value;
        }
      }

      var resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.className = '';
      resultEl.textContent = 'Sending...';

      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(function(r) { return r.text().then(function(text) { return { status: r.status, text: text }; }); })
      .then(function(r) {
        resultEl.className = r.status === 200 ? 'success' : 'error';
        resultEl.textContent = 'Status: ' + r.status + '\nResponse: ' + r.text + '\n\nURL: ' + url + '\nBody sent: ' + JSON.stringify(body, null, 2);
      })
      .catch(function(err) {
        resultEl.className = 'error';
        resultEl.textContent = 'Error: ' + err.message;
      });
    }
  </script>
</body>
</html>
